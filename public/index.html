<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F.R.I.D.A.Y.</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- BOOT SCREEN -->
  <div id="boot-screen">
    <div class="boot-grid"></div>
    <div class="boot-rings">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
    </div>
    <div class="boot-orb"></div>
    <h1 class="boot-title" id="boot-title"></h1>
    <p class="boot-sub" id="boot-sub">FEMALE REPLACEMENT INTELLIGENT DIGITAL ASSISTANT YIELDING</p>
    <div class="boot-bar-track"><div class="boot-bar-fill" id="boot-bar"></div></div>
    <div class="boot-logs" id="boot-logs"></div>
  </div>

  <!-- MAIN APP — Split Layout -->
  <div id="main-app" style="display:none">
    <div class="scanlines"></div>
    <div class="holographic"></div>
    <div class="mouse-glow" id="mouse-glow"></div>

    <!-- LEFT PANEL — Holographic Command Center -->
    <aside class="holo-panel" id="holo-panel">
      <div class="holo-bg">
        <div class="holo-grid"></div>
        <div class="holo-glow"></div>
        <div class="holo-scanline"></div>
      </div>

      <div class="holo-header">
        <span class="mode-badge" id="mode-badge">OFFLINE</span>
        <span class="quota-pill" id="quota-pill">
          <i class="fa-solid fa-bolt"></i>
          <span id="quota-rpm">--/--</span> RPM
        </span>
      </div>

      <!-- ORB -->
      <div class="holo-orb-stage" id="orb-stage">
        <canvas id="orb-canvas" width="500" height="500"></canvas>
        <div class="orb-click-zone" id="orb-click" title="Click to talk">
          <i class="fa-solid fa-microphone mic-icon"></i>
        </div>

        <!-- Holographic projection lines above orb -->
        <div class="holo-projection">
          <div class="proj-line"></div>
          <div class="proj-line"></div>
          <div class="proj-line"></div>
          <div class="proj-line"></div>
          <div class="proj-line"></div>
        </div>

        <!-- RGB split glow -->
        <div class="orb-rgb-glow" id="orb-rgb-glow">
          <div class="rgb-r"></div>
          <div class="rgb-g"></div>
          <div class="rgb-b"></div>
        </div>
      </div>

      <div class="holo-status" id="holo-status">STANDBY</div>
      <div class="holo-label" id="holo-label">Tap the orb or type a command</div>

      <!-- Speech detector waves -->
      <div class="speech-waves" id="speech-waves">
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
      </div>

      <!-- Mic button -->
      <button class="holo-mic-btn" id="holo-mic-btn" title="Toggle Microphone">
        <i class="fa-solid fa-microphone"></i>
        <div class="mic-ring-outer"></div>
        <div class="mic-ring-inner"></div>
      </button>

      <!-- Timer pill -->
      <div class="timer-pill hidden" id="timer-pill">
        <i class="fa-solid fa-stopwatch"></i>
        <span id="timer-display">0:00</span>
      </div>

      <!-- Dock -->
      <nav class="holo-dock" id="holo-dock">
        <button class="dock-btn" data-panel="activity" title="PC Activity"><i class="fa-solid fa-chart-line"></i></button>
        <button class="dock-btn" data-panel="system" title="System"><i class="fa-solid fa-microchip"></i></button>
        <button class="dock-btn" data-panel="weather" title="Weather"><i class="fa-solid fa-cloud-sun"></i></button>
        <button class="dock-btn" data-panel="emails" title="Emails"><i class="fa-solid fa-envelope"></i></button>
        <button class="dock-btn" data-panel="processes" title="Processes"><i class="fa-solid fa-list-ol"></i></button>
        <button class="dock-btn" data-panel="vault" title="Vault"><i class="fa-solid fa-database"></i></button>
        <button class="dock-btn" data-panel="clipboard" title="Clipboard"><i class="fa-solid fa-clipboard"></i></button>
        <button class="dock-btn" data-panel="settings" title="Settings"><i class="fa-solid fa-gear"></i></button>
        <button class="dock-btn" data-panel="commands" title="Commands"><i class="fa-solid fa-terminal"></i></button>
      </nav>
    </aside>

    <!-- RIGHT PANEL — Chat & Output -->
    <main class="chat-panel" id="chat-panel">
      <header class="hdr">
        <div class="hdr-l">
          <span class="logo">F.R.I.D.A.Y.</span>
          <span class="ver">v3.5</span>
        </div>
        <div class="hdr-r">
          <span class="dot-pulse" id="status-dot"></span>
          <span id="hdr-clock">00:00:00</span>
        </div>
      </header>

      <div class="chat-area" id="chat-area">
        <div class="msgs" id="msgs"></div>
      </div>

      <div class="input-bar">
        <div class="txt-wrap">
          <input type="text" id="chat-input" placeholder="Type a command or ask anything..." autocomplete="off">
          <button class="send" id="send-btn"><i class="fa-solid fa-arrow-up"></i></button>
        </div>
      </div>
    </main>

    <!-- PANELS (floating glassmorphic) -->
    <div class="panels" id="panels"></div>
  </div>

  <div class="toasts" id="toasts"></div>

  <script src="app.js"></script>
</body>
</html>
