<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENNY Mini HUD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #08080e;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --txt: rgba(255,255,255,0.9);
      --txt2: rgba(255,255,255,0.5);
      --txt3: rgba(255,255,255,0.3);
      --cyan: #00f2fe;
      --pink: #ff007f;
      --purple: #7928ca;
      --mono: 'SF Mono', 'Fira Code', 'Menlo', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--txt);
      font-family: var(--mono);
      width: 380px;
      height: 540px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
    }
    .hdr-title {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--pink));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: flex; align-items: center; gap: 6px;
    }
    .hdr-title i { -webkit-text-fill-color: var(--cyan); font-size: 10px; }
    .hdr-status {
      font-size: 9px; padding: 2px 8px; border-radius: 10px;
      border: 1px solid rgba(0,242,254,0.2); color: var(--cyan);
      background: rgba(0,242,254,0.06); display: flex; align-items: center; gap: 4px;
    }
    .hdr-status .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--cyan); animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.3;} 50%{opacity:1;} }

    /* Orb Stage */
    .orb-stage {
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 12px 12px; position: relative;
      background: linear-gradient(180deg, rgba(0,242,254,0.02) 0%, transparent 100%);
    }
    .orb-container {
      position: relative; width: 80px; height: 80px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .orb-glow {
      position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,242,254,0.5) 0%, rgba(255,0,127,0.3) 50%, transparent 70%);
      filter: blur(12px); animation: glow 3s ease-in-out infinite;
    }
    @keyframes glow { 0%,100%{transform:scale(0.8);opacity:0.5;} 50%{transform:scale(1.3);opacity:1;} }
    .orb-core {
      position: relative; width: 50px; height: 50px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--cyan), var(--pink), var(--purple));
      box-shadow: inset 0 0 12px rgba(255,255,255,0.8), 0 0 25px rgba(0,242,254,0.7);
      transition: all 0.3s;
    }
    .orb-container:hover .orb-core { transform: scale(1.1); }
    .orb-container.active .orb-glow {
      background: radial-gradient(circle, rgba(255,0,127,0.7) 0%, rgba(121,40,202,0.4) 60%, transparent 70%);
    }
    .orb-container.active .orb-core {
      animation: orbPulse 1.5s ease-in-out infinite;
    }
    @keyframes orbPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }

    /* Wave Canvas */
    #wave-canvas { width: 100%; height: 32px; display: block; }

    /* Mic Button */
    .mic-btn {
      width: 100%; padding: 10px; margin-top: 4px;
      background: linear-gradient(135deg, rgba(0,242,254,0.1), rgba(255,0,127,0.1));
      border: 1px solid rgba(0,242,254,0.25); border-radius: 10px;
      color: #fff; font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: 1.5px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s;
    }
    .mic-btn:hover {
      background: linear-gradient(135deg, rgba(0,242,254,0.2), rgba(255,0,127,0.2));
      border-color: var(--cyan); box-shadow: 0 0 16px rgba(0,242,254,0.2);
      transform: translateY(-1px);
    }
    .mic-btn.active {
      background: linear-gradient(135deg, rgba(255,0,127,0.3), rgba(121,40,202,0.3));
      border-color: var(--pink); box-shadow: 0 0 20px rgba(255,0,127,0.3);
    }
    .mic-btn i { font-size: 12px; }

    /* Stats Grid */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 6px; padding: 8px 12px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px; text-align: center;
      transition: all 0.2s;
    }
    .stat-card:hover { border-color: rgba(255,255,255,0.12); }
    .stat-val { font-size: 14px; font-weight: 700; color: var(--txt); }
    .stat-lbl { font-size: 7px; color: var(--txt3); letter-spacing: 1px; margin-top: 2px; }

    /* Action Grid */
    .actions-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; padding: 6px 12px;
    }
    .action-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 10px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--txt2); font-family: var(--mono);
      font-size: 9px; cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.5px;
    }
    .action-btn:hover {
      background: rgba(0,242,254,0.08); border-color: rgba(0,242,254,0.2);
      color: var(--txt);
    }
    .action-btn i { color: var(--cyan); font-size: 10px; width: 14px; text-align: center; }

    /* Transcript */
    .transcript {
      flex: 1; margin: 0 12px 10px; padding: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; overflow-y: auto;
      font-size: 10px; color: var(--txt2); line-height: 1.6;
      min-height: 0;
    }
    .transcript::-webkit-scrollbar { width: 2px; }
    .transcript::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    .transcript-label {
      font-size: 8px; color: var(--txt3); letter-spacing: 1px; margin-bottom: 4px;
    }
    .transcript-msg { margin-bottom: 6px; }
    .transcript-msg.user { color: var(--cyan); }
    .transcript-msg.ai { color: var(--txt); }

    /* Footer */
    .footer {
      display: flex; justify-content: center; gap: 8px;
      padding: 6px 12px 10px; border-top: 1px solid var(--border);
    }
    .footer-btn {
      padding: 5px 10px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--txt3); font-family: var(--mono); font-size: 8px;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
    }
    .footer-btn:hover { border-color: rgba(255,255,255,0.12); color: var(--txt2); }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="hdr">
    <div class="hdr-title"><i class="fa-solid fa-brain"></i> JENNY MINI</div>
    <div class="hdr-status" id="status-badge"><span class="dot"></span><span id="status-text">ONLINE</span></div>
  </div>

  <!-- Orb -->
  <div class="orb-stage">
    <div class="orb-container" id="orb-container" onclick="toggleMic()">
      <div class="orb-glow"></div>
      <div class="orb-core"></div>
    </div>
    <canvas id="wave-canvas" width="356" height="32"></canvas>
    <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
      <i class="fa-solid fa-microphone"></i> <span id="mic-label">TAP TO SPEAK</span>
    </button>
  </div>

  <!-- System Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val" id="s-cpu">--</div>
      <div class="stat-lbl">CPU</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-ram">--</div>
      <div class="stat-lbl">RAM</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-batt">--</div>
      <div class="stat-lbl">BATTERY</div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="actions-grid">
    <button class="action-btn" onclick="quickCmd('briefing')"><i class="fa-solid fa-clipboard-list"></i> Briefing</button>
    <button class="action-btn" onclick="quickCmd('what is the weather')"><i class="fa-solid fa-cloud-sun"></i> Weather</button>
    <button class="action-btn" onclick="quickCmd('system status')"><i class="fa-solid fa-microchip"></i> System</button>
    <button class="action-btn" onclick="quickCmd('tell me a joke')"><i class="fa-solid fa-face-laugh"></i> Joke</button>
  </div>

  <!-- Transcript -->
  <div class="transcript" id="transcript">
    <div class="transcript-label">NEURAL STREAM</div>
    <div id="transcript-content">
      <div class="transcript-msg ai">Ready, BOSS. Tap the orb or use quick actions.</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="footer-btn" onclick="openMain()"><i class="fa-solid fa-expand"></i> FULL APP</button>
    <button class="footer-btn" onclick="refreshStats()"><i class="fa-solid fa-arrow-rotate-right"></i> REFRESH</button>
  </div>

  <script>
    let isListening = false;
    const API = '';

    // Mic toggle
    function toggleMic() {
      fetch(API + '/api/toggle-mic').then(() => {
        isListening = !isListening;
        const btn = document.getElementById('mic-btn');
        const label = document.getElementById('mic-label');
        const orb = document.getElementById('orb-container');
        const st = document.getElementById('status-text');
        if (isListening) {
          btn.classList.add('active');
          orb.classList.add('active');
          label.textContent = 'LISTENING...';
          st.textContent = 'LISTENING';
          st.style.color = '#ff007f';
          addMsg('Listening...', 'user');
        } else {
          btn.classList.remove('active');
          orb.classList.remove('active');
          label.textContent = 'TAP TO SPEAK';
          st.textContent = 'ONLINE';
          st.style.color = '';
        }
      });
    }

    // Quick command
    function quickCmd(cmd) {
      addMsg(cmd, 'user');
      fetch(API + '/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: cmd })
      })
      .then(r => r.json())
      .then(d => {
        if (d.success && d.reply) addMsg(d.reply.text, 'ai');
        else addMsg('No response.', 'ai');
      })
      .catch(() => addMsg('Connection error.', 'ai'));
    }

    // Add message to transcript
    function addMsg(text, role) {
      const el = document.getElementById('transcript-content');
      const div = document.createElement('div');
      div.className = 'transcript-msg ' + role;
      div.textContent = text;
      el.appendChild(div);
      const box = document.getElementById('transcript');
      box.scrollTop = box.scrollHeight;
      // Keep only last 20 messages
      while (el.children.length > 21) el.removeChild(el.children[1]);
    }

    // Open main app
    function openMain() {
      window.open('http://localhost:3000', '_blank');
    }

    // Refresh stats
    function refreshStats() {
      fetch(API + '/api/system-status')
        .then(r => r.json())
        .then(d => {
          if (!d.success) return;
          document.getElementById('s-cpu').textContent = (d.cpu?.usage || 0) + '%';
          document.getElementById('s-ram').textContent = (d.ram?.usage || 0) + '%';
          document.getElementById('s-batt').textContent = (d.battery?.level ?? '--') + '%';
        })
        .catch(() => {});
    }

    // Auto-refresh stats every 5s
    setInterval(refreshStats, 5000);
    refreshStats();

    // Poll mic state from server
    let lastToggle = 0;
    function pollMicState() {
      fetch(API + '/api/toggle-mic-poll')
        .then(r => r.json())
        .then(d => {
          if (d.lastToggle && d.lastToggle !== lastToggle) {
            lastToggle = d.lastToggle;
            toggleMic();
          }
        })
        .catch(() => {});
    }
    setInterval(pollMicState, 2000);

    // Wave animation
    const canvas = document.getElementById('wave-canvas');
    const ctx = canvas.getContext('2d');
    let step = 0;
    function drawWave() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      step += 0.06;
      const amp = isListening ? 10 : 3;
      const colors = ['rgba(0,242,254,0.6)', 'rgba(255,0,127,0.5)', 'rgba(121,40,202,0.4)'];
      colors.forEach((color, i) => {
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = isListening ? 1.5 : 1;
        for (let x = 0; x < canvas.width; x += 3) {
          const y = canvas.height / 2 + Math.sin(x * 0.04 + step + i * 1.2) * amp * Math.sin((x / canvas.width) * Math.PI);
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      });
      requestAnimationFrame(drawWave);
    }
    drawWave();
  </script>
</body>
</html>
