<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENNY Mini HUD</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #000000;
      --glass-bg: rgba(0, 0, 0, 0.45);
      --glass-card: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(229, 193, 88, 0.3);
      --gold: #e5c158;
      --gold-glow: rgba(229, 193, 88, 0.25);
      --silver: #c0c0c0;
      --txt: #ffffff;
      --txt2: #d1d5db;
      --txt3: #9ca3af;
      --mono: 'SF Mono', -apple-system, BlinkMacSystemFont, 'Menlo', monospace;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(40px) saturate(2.0);
      -webkit-backdrop-filter: blur(40px) saturate(2.0);
      color: var(--txt);
      font-family: var(--mono);
      width: 460px;
      height: 680px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.8), 0 0 30px rgba(229, 193, 88, 0.15);
    }

    /* HEADER */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid var(--glass-border);
    }
    .hdr-l {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hdr-logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
    }
    .hdr-title {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #fff;
    }
    .hdr-badge {
      font-size: 9px;
      padding: 3px 8px;
      border-radius: 12px;
      background: var(--gold-glow);
      border: 1px solid var(--glass-border);
      color: var(--gold);
      letter-spacing: 1px;
    }
    .hdr-r {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .icon-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--txt2);
      width: 28px;
      height: 28px;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .icon-btn:hover {
      background: var(--gold);
      color: #000;
    }

    /* ORB & INPUT CONTAINER */
    .hero-stage {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 18px;
      background: var(--glass-card);
      border-bottom: 1px solid var(--glass-border);
    }
    .orb-wrap {
      position: relative;
      width: 76px;
      height: 76px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    #orb-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .mic-icon {
      position: absolute;
      font-size: 18px;
      color: var(--gold);
      pointer-events: none;
      text-shadow: 0 0 10px var(--gold);
    }

    .hero-input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    .hud-input {
      flex: 1;
      padding: 10px 14px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: #fff;
      font-family: var(--mono);
      font-size: 11px;
      outline: none;
      transition: all 0.2s;
    }
    .hud-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 15px var(--gold-glow);
    }
    .hud-send {
      width: 36px;
      background: var(--gold-glow);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--gold);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hud-send:hover {
      background: var(--gold);
      color: #000;
    }
    .mic-hint {
      font-size: 9px;
      color: var(--silver);
      letter-spacing: 1px;
    }

    /* TELEMETRY GAUGES */
    .telemetry-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .t-card {
      background: var(--glass-card);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 8px 6px;
      text-align: center;
    }
    .t-val {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      margin-top: 2px;
    }
    .t-lbl {
      font-size: 8px;
      color: var(--silver);
      letter-spacing: 1px;
    }

    /* POWER CHIPS DOCK */
    .chips-section {
      padding: 12px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .chips-lbl {
      font-size: 9px;
      color: var(--gold);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .chips-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .power-btn {
      background: var(--glass-card);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      padding: 8px 4px;
      color: var(--txt2);
      font-family: var(--mono);
      font-size: 9px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .power-btn:hover {
      background: var(--gold-glow);
      border-color: var(--gold);
      color: #fff;
      transform: translateY(-1px);
    }
    .power-btn i {
      color: var(--gold);
      font-size: 11px;
    }

    /* CHAT STREAM FEED */
    .feed-stage {
      flex: 1;
      padding: 12px 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }
    .feed-msg {
      max-width: 90%;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 11px;
      line-height: 1.5;
      word-break: break-word;
    }
    .feed-msg.user {
      align-self: flex-end;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
    }
    .feed-msg.ai {
      align-self: flex-start;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--glass-border);
      color: var(--txt2);
      border-left: 3px solid var(--gold);
    }

    /* FOOTER */
    .ftr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      background: rgba(0,0,0,0.4);
      border-top: 1px solid var(--glass-border);
      font-size: 9px;
      color: var(--silver);
    }
    .ftr-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      border-radius: 6px;
      color: var(--gold);
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 9px;
      cursor: pointer;
    }
    .ftr-btn:hover {
      background: var(--gold);
      color: #000;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-l">
      <img src="logo.png" class="hdr-logo" alt="Jenny">
      <span class="hdr-title">J.E.N.N.Y.</span>
      <span class="hdr-badge">MINI HUD 2.0</span>
    </div>
    <div class="hdr-r">
      <button class="icon-btn" id="open-training-btn" title="AI Training Hub"><i class="fa-solid fa-brain"></i></button>
      <button class="icon-btn" id="open-main-btn" title="Open Full Interface"><i class="fa-solid fa-expand"></i></button>
    </div>
  </header>

  <!-- ORB & INPUT -->
  <div class="hero-stage">
    <div class="orb-wrap" id="orb-trigger" title="Tap to Dictate Voice Command">
      <canvas id="orb-canvas" width="76" height="76"></canvas>
      <i class="fa-solid fa-microphone mic-icon"></i>
    </div>
    <div class="hero-input-wrap">
      <div class="input-row">
        <input type="text" id="mini-input" class="hud-input" placeholder="Ask JENNY or dictation command...">
        <button id="mini-send-btn" class="hud-send"><i class="fa-solid fa-paper-plane"></i></button>
      </div>
      <div class="mic-hint" id="mic-status-hint">TAP ORB OR TYPE COMMAND</div>
    </div>
  </div>

  <!-- TELEMETRY -->
  <div class="telemetry-bar">
    <div class="t-card">
      <div class="t-lbl">CPU</div>
      <div class="t-val" id="hud-cpu">--%</div>
    </div>
    <div class="t-card">
      <div class="t-lbl">RAM</div>
      <div class="t-val" id="hud-ram">--%</div>
    </div>
    <div class="t-card">
      <div class="t-lbl">BATTERY</div>
      <div class="t-val" id="hud-bat">--%</div>
    </div>
    <div class="t-card">
      <div class="t-lbl">UPTIME</div>
      <div class="t-val" id="hud-up">--h</div>
    </div>
  </div>

  <!-- POWER DOCK -->
  <div class="chips-section">
    <div class="chips-lbl"><i class="fa-solid fa-bolt"></i> Quick Controls</div>
    <div class="chips-grid">
      <button class="power-btn" data-cmd="Hi I am on my way home">
        <i class="fa-solid fa-car"></i> On Way Home
      </button>
      <button class="power-btn" data-cmd="wake mac display">
        <i class="fa-solid fa-sun"></i> Wake Display
      </button>
      <button class="power-btn" data-cmd="lock screen">
        <i class="fa-solid fa-lock"></i> Lock Screen
      </button>
      <button class="power-btn" data-cmd="purge ram">
        <i class="fa-solid fa-broom"></i> Purge RAM
      </button>
      <button class="power-btn" data-cmd="battery status">
        <i class="fa-solid fa-battery-three-quarters"></i> Battery
      </button>
      <button class="power-btn" data-cmd="open youtube">
        <i class="fa-solid fa-play"></i> YouTube
      </button>
      <button class="power-btn" data-cmd="volume 80">
        <i class="fa-solid fa-volume-high"></i> Volume 80%
      </button>
      <button class="power-btn" data-cmd="read my emails">
        <i class="fa-solid fa-envelope"></i> Read Mail
      </button>
    </div>
  </div>

  <!-- CHAT FEED -->
  <div class="feed-stage" id="hud-feed">
    <div class="feed-msg ai">
      <strong>JENNY:</strong> Neural Link active. How can I assist you, BOSS?
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="ftr">
    <span>SYSTEM: <strong style="color:var(--gold)">ONLINE</strong></span>
    <button class="ftr-btn" id="open-desktop-btn">OPEN DESKTOP INTERFACE</button>
  </footer>

  <script>
    const feed = document.getElementById('hud-feed');
    const input = document.getElementById('mini-input');
    const sendBtn = document.getElementById('mini-send-btn');
    const orbTrigger = document.getElementById('orb-trigger');
    const micHint = document.getElementById('mic-status-hint');

    function appendMsg(sender, text) {
      const div = document.createElement('div');
      div.className = `feed-msg ${sender === 'USER' ? 'user' : 'ai'}`;
      div.innerHTML = `<strong>${sender}:</strong> ${text.replace(/\n/g, '<br>')}`;
      feed.appendChild(div);
      feed.scrollTop = feed.scrollHeight;
    }

    async function sendCmd(msg) {
      if (!msg.trim()) return;
      appendMsg('USER', msg);
      input.value = '';
      
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg })
        });
        const d = await res.json();
        if (d.success && d.reply) {
          appendMsg('JENNY', d.reply.text);
          if (d.reply.command && d.reply.command.action !== 'vault-save') {
            await fetch('/api/control', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(d.reply.command)
            });
          }
        }
      } catch (e) {
        appendMsg('JENNY', 'Command execution error.');
      }
    }

    sendBtn.addEventListener('click', () => sendCmd(input.value));
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendCmd(input.value); });

    document.querySelectorAll('.power-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const cmd = btn.dataset.cmd;
        if (cmd) sendCmd(cmd);
      });
    });

    document.getElementById('open-main-btn').addEventListener('click', () => {
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.openFullApp) {
        window.webkit.messageHandlers.openFullApp.postMessage('open');
      } else {
        window.open('http://localhost:3005', '_blank');
      }
    });

    document.getElementById('open-desktop-btn').addEventListener('click', () => {
      if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.openDesktopApp) {
        window.webkit.messageHandlers.openDesktopApp.postMessage('open');
      } else {
        window.open('http://localhost:3005', '_blank');
      }
    });

    document.getElementById('open-training-btn').addEventListener('click', () => {
      sendCmd('my training');
    });

    // CANVAS ORB ANIMATION
    const canvas = document.getElementById('orb-canvas');
    const ctx = canvas.getContext('2d');
    let frame = 0;
    let isListening = false;

    function drawOrb() {
      frame++;
      const W = canvas.width, H = canvas.height;
      const cx = W / 2, cy = H / 2;
      ctx.clearRect(0, 0, W, H);
      const t = frame * 0.03;

      for (let i = 0; i < 3; i++) {
        const r = 24 + i * 8;
        ctx.beginPath();
        ctx.arc(cx, cy, r + Math.sin(t + i) * 3, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(229,193,88,${0.15 + i * 0.1})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      ctx.beginPath();
      ctx.arc(cx, cy, 18 + Math.sin(t * 1.5) * 2, 0, Math.PI * 2);
      ctx.fillStyle = isListening ? 'rgba(229,193,88,0.7)' : 'rgba(229,193,88,0.3)';
      ctx.fill();

      requestAnimationFrame(drawOrb);
    }
    drawOrb();

    // SPEECH RECOGNITION
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      const r = new SR();
      r.continuous = false;
      r.interimResults = false;
      r.onstart = () => { isListening = true; micHint.textContent = 'LISTENING FOR VOICE COMMAND...'; };
      r.onresult = (e) => { sendCmd(e.results[0][0].transcript); };
      r.onend = () => { isListening = false; micHint.textContent = 'TAP ORB OR TYPE COMMAND'; };
      r.onerror = () => { isListening = false; micHint.textContent = 'TAP ORB OR TYPE COMMAND'; };

      orbTrigger.addEventListener('click', () => {
        if (isListening) r.stop();
        else r.start();
      });
    }

    // TELEMETRY REFRESH
    async function updateTelemetry() {
      try {
        const res = await fetch('/api/system-status');
        const d = await res.json();
        if (d.success) {
          document.getElementById('hud-cpu').textContent = (d.cpu?.usage || 0) + '%';
          document.getElementById('hud-ram').textContent = (d.ram?.usage || 0) + '%';
          document.getElementById('hud-bat').textContent = Math.round(d.battery?.level || 100) + '%';
          document.getElementById('hud-up').textContent = Math.floor((d.uptime || 0) / 3600) + 'h';
        }
      } catch {}
    }
    updateTelemetry();
    setInterval(updateTelemetry, 4000);
  </script>
</body>
</html>
